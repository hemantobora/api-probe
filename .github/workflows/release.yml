name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout api-probe
        uses: actions/checkout@v4

      - name: Compute version and sha256
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url=$URL"         >> $GITHUB_OUTPUT
          echo "sha256=$SHA"      >> $GITHUB_OUTPUT

      - name: Update formula in homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/hemantobora/homebrew-tap.git tap

          python3 - << 'EOF'
          import sys

          with open(".github/api-probe.rb.template") as f:
              formula = f.read()

          formula = formula.replace("{{VERSION}}", "${{ steps.meta.outputs.version }}")
          formula = formula.replace("{{URL}}",     "${{ steps.meta.outputs.url }}")
          formula = formula.replace("{{SHA256}}",  "${{ steps.meta.outputs.sha256 }}")

          with open("tap/Formula/api-probe.rb", "w") as f:
              f.write(formula)
          EOF

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/api-probe.rb
          git diff --staged --quiet || git commit -m "api-probe ${{ steps.meta.outputs.tag }}"
          git push
